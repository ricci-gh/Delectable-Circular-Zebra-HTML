            <script defer="" data-name="navigation-logic">
              document.addEventListener('DOMContentLoaded', function() {
                (function(){
                  const navToggle = document.getElementById("navigationToggle")
                  const navClose = document.getElementById("navigationClose")
                  const navOverlay = document.getElementById("navigationOverlay")
                  const navLinks = document.querySelectorAll(".navigation-mobile-link")

                  function openMenu() {
                    navOverlay.style.display = "flex"
                    // Small delay to trigger transition
                    setTimeout(() => {
                      navOverlay.classList.add("is-active")
                      navToggle.setAttribute("aria-expanded", "true")
                      navOverlay.setAttribute("aria-hidden", "false")
                      document.body.style.overflow = "hidden"
                    }, 10)
                  }

                  function closeMenu() {
                    navOverlay.classList.remove("is-active")
                    navToggle.setAttribute("aria-expanded", "false")
                    navOverlay.setAttribute("aria-hidden", "true")
                    document.body.style.overflow = ""

                    // Wait for transition to end before hiding
                    setTimeout(() => {
                      if (!navOverlay.classList.contains("is-active")) {
                        navOverlay.style.display = "none"
                      }
                    }, 300)
                  }

                  if (navToggle) {
                    navToggle.addEventListener("click", openMenu)
                  }

                  if (navClose) {
                    navClose.addEventListener("click", closeMenu)
                  }

                  // Close menu when clicking links
                  navLinks.forEach((link) => {
                    link.addEventListener("click", closeMenu)
                  })

                  // Close menu on ESC key
                  document.addEventListener("keydown", (e) => {
                    if (e.key === "Escape" && navOverlay.classList.contains("is-active")) {
                      closeMenu()
                    }
                  })

                  // Close menu if window is resized above mobile breakpoint
                  window.addEventListener("resize", () => {
                    if (window.innerWidth > 767 && navOverlay.classList.contains("is-active")) {
                      closeMenu()
                    }
                  })
                })()
              });
            </script>
          </div>
        </div>
