            <script defer="" data-name="footer-scroll-top">
              document.addEventListener('DOMContentLoaded', function() {
                (function(){
                  const footerTelLink = document.querySelector(".footer-tel")
                  if (footerTelLink) {
                    footerTelLink.addEventListener("mouseenter", () => {
                      footerTelLink.style.transition = "color 0.2s ease"
                    })
                  }

                  const socialLinks = document.querySelectorAll(".footer-social-link")
                  socialLinks.forEach((link) => {
                    link.addEventListener("focus", () => {
                      link.style.outline = "2px solid var(--color-secondary)"
                      link.style.outlineOffset = "2px"
                    })
                    link.addEventListener("blur", () => {
                      link.style.outline = "none"
                    })
                  })
                })()
              });
